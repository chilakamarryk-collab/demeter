
<!DOCTYPE html>
<html>
<head>
    <title>CrumbWise Prototype</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #fafafa;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
        }
        .result {
            margin-top: 20px;
            background: #eef6ec;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>CrumbWise Prototype</h1>
    <p>Estimate bakery waste reduction opportunities.</p>

    <label>Daily Unsold Items</label>
    <input type="number" id="unsold" placeholder="Enter number">

    <label>Average Cost Per Item ($)</label>
    <input type="number" id="cost" placeholder="Enter cost">

    <button onclick="calculate()">Calculate Waste Impact</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculate() {
    const unsold = parseFloat(document.getElementById('unsold').value) || 0;
    const cost = parseFloat(document.getElementById('cost').value) || 0;

    const monthlyLoss = unsold * cost * 30;
    const reduction = monthlyLoss * 0.25;

    document.getElementById('output').innerHTML =
        "<strong>Estimated Monthly Waste Cost:</strong> $" + monthlyLoss.toFixed(2) +
        "<br><strong>Potential Savings with Better Forecasting:</strong> $" +
        reduction.toFixed(2);
}
</script>
</body>
</html>
